<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - MCC Grievance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .card-wrap { max-width: 420px; margin: 60px auto; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .card-header { background-color: #1a3c5e; color: white; border-radius: 12px 12px 0 0 !important; text-align: center; padding: 25px; }
        .card-header h4 { margin: 0; font-size: 20px; }
        .card-header p { margin: 5px 0 0 0; font-size: 13px; color: #cce4ff; }
        .btn-primary { background-color: #1a3c5e; border-color: #1a3c5e; }
        .btn-primary:hover { background-color: #14304d; border-color: #14304d; }
    </style>
</head>
<body>
<div class="card-wrap">
    <div class="card">
        <div class="card-header">
            <h4>🔑 Forgot Password</h4>
            <p>Reset your password using your username and email</p>
        </div>
        <div class="card-body p-4">
            {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="alert alert-success">Password updated successfully!</div>
            <div class="d-grid">
                <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
            </div>
            {% else %}
            <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Registered Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">New Password</label>
                <input type="password" name="new_password" class="form-control" placeholder="Enter new password" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </div>
            </form>
            {% endif %}
        </div>
    </div>
    <div class="text-center mt-3">
        <a href="{% url 'login' %}" style="font-size:13px; color:#666;">← Back to Login</a>
    </div>
</div>
</body>
</html>
