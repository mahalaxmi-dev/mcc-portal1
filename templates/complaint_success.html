<!DOCTYPE html>
<html>
<head>
    <title>Complaint Submitted - MCC Grievance Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .card-wrap { max-width: 500px; margin: 80px auto; text-align: center; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .complaint-id { font-size: 36px; font-weight: bold; color: #1a3c5e; letter-spacing: 3px; }
        .btn-primary { background-color: #1a3c5e; border-color: #1a3c5e; }
        .btn-primary:hover { background-color: #14304d; }
        .btn-outline-primary { color: #1a3c5e; border-color: #1a3c5e; }
        .btn-outline-primary:hover { background-color: #1a3c5e; color: white; }
    </style>
</head>
<body>
<div class="card-wrap">
    <div class="card p-5">
        <div style="font-size:60px; margin-bottom:15px;">✅</div>
        <h3 class="fw-bold mb-2">Complaint Submitted!</h3>
        <p class="text-muted mb-3">Your complaint has been successfully registered and routed to the concerned department.</p>
        <div class="bg-light rounded p-3 mb-4">
            <p class="mb-1 text-muted" style="font-size:13px;">Your Complaint ID</p>
            <div class="complaint-id">#{{ complaint_id }}</div>
            <p class="mt-2 text-muted" style="font-size:12px;">Save this ID to track your complaint anytime</p>
        </div>
        <div class="d-grid gap-2">
            <a href="{% url 'dashboard' %}" class="btn btn-primary">📋 Go to Dashboard</a>
            <a href="{% url 'track_complaint' %}" class="btn btn-outline-primary">🔍 Track This Complaint</a>
            <a href="{% url 'terms' %}" class="btn btn-outline-secondary">📝 File Another Complaint</a>
        </div>
    </div>
</div>
</body>
</html>
